apiVersion: v1
kind: Service
metadata:
  name: calculator-clusterip-service
  labels:
    app: calculator-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: calculator-app
---
apiVersion: v1
kind: Service
metadata:
  name: calculator-nodeport-service
  labels:
    app: calculator-app
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: calculator-app
